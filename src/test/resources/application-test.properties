spring.application.name=lacsc
server.port=8081

# H2 Database (In-Memory for Testing)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Keycloak - Mock for testing (disable JWT validation)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8089/realms/lacsc2026-dev
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8089/realms/lacsc2026-dev/protocol/openid-connect/certs

jwt.principal-attribute=preferred_username
jwt.auth.converter.resource-id=lacsc2026-dev

spring.security.oauth2.client.registration.keycloak.client-id=lacsc2026-dev
spring.security.oauth2.client.registration.keycloak.client-secret=test-secret
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8089/realms/lacsc2026-dev

keycloak.server-url=http://localhost:8089
keycloak.realm=lacsc2026-dev
keycloak.admin.username=admin
keycloak.admin.password=admin
keycloak.client-id=lacsc2026-dev
keycloak.client-secret=test-secret

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%5p) %clr(${PID}){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n

auth.cookie.name=access_token
auth.cookie.secure=false
auth.cookie.same-site=Lax
auth.cookie.domain=localhost
auth.cookie.max-age-seconds=1800
